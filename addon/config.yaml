name: "TRMNL HA Server"
version: "1.0.0"
slug: trmnl_ha_server
description: "Renders Home Assistant dashboards for TRMNL e-ink devices"
url: "https://github.com/mrmagooey/trmnl-ha-server"
arch:
  - aarch64
  - amd64
startup: application
image: "ghcr.io/mrmagooey/trmnl-ha-server"
map:
  - addon_config:rw
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "TRMNL device HTTP endpoint"
options:
  server_name: ""
  port: 8000
  debug: false
schema:
  server_name: str
  port: "int(1,65535)"
  debug: bool
homeassistant_api: true
