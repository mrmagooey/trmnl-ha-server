# List of devices. Each device has an ID, optional sleep window, and a schedule
# of dashboards to display at specific times/days.
devices:
  - # The device ID sent by the TRMNL firmware in the 'ID' HTTP header (MAC address).
    # Fallback: IP address if no ID header is present.
    id: "AA:BB:CC:DD:EE:FF"

    # Optional sleep window (local time, HH:MM). During this window the server
    # overrides the refresh_rate to the number of seconds until sleep_end.
    sleep_start: "23:00"
    sleep_end: "06:00"

    # Schedule of dashboards for this device.
    # Each entry references a dashboard by its 'name' and defines when to show it.
    schedule:
      - # Name of the dashboard to display (must match a 'name' in the dashboards list).
        dashboard: weekday_morning
        # Start time (inclusive, HH:MM local time) when this dashboard is eligible.
        start_time: "06:00"
        # End time (exclusive, HH:MM local time) when this dashboard stops being shown.
        end_time: "10:00"
        # Days this entry is active. Formats: "Monday-Friday" (range) or "Monday" (single).
        days_of_the_week: "Monday-Friday"
        # How often (in seconds) the client should refresh while this dashboard is active.
        refresh_rate: 600

      - dashboard: daytime
        start_time: "10:00"
        end_time: "18:00"
        days_of_the_week: "Monday-Friday"
        refresh_rate: 600

      - dashboard: night
        start_time: "18:00"
        end_time: "22:00"
        days_of_the_week: "Monday-Sunday"
        refresh_rate: 600


# List of dashboards. Each dashboard defines content only — scheduling is
# configured per-device above.
dashboards:
  - # Unique identifier for the dashboard.
    # Also used to form the image filename: /static/<name>.png
    name: weekday_morning
    # Optional title rendered at the top of the image.
    title: "Morning"
    # Optional: Rotate the dashboard image 90 degrees clockwise for portrait orientation.
    # portrait: true

    # Components to render on the dashboard.
    components:
      - # Human-friendly label shown on the component.
        friendly_name: "Shared Calendar"
        # Component type. Supported types:
        # - "calendar": shows upcoming calendar events
        # - "entity": shows a single entity state
        # - "entities": shows a list of entity states
        # - "history_graph": shows a graph of numeric history for an entity
        # - "todo_list": shows incomplete items from a Home Assistant todo list
        type: "calendar"
        arguments:
          calendar_id: "calendar.name"
          days: 2

      - entity_name: "sensor.sensor_name"
        friendly_name: "UV Forecast"
        type: entity

      - friendly_name: "Today's Weather"
        type: "entities"
        entities:
          - entity_name: "sensor.sensor_name2"
            friendly_name: "Weather"
          - entity_name: "sensor.sensor_name3"
            friendly_name: "Today Max"
          - entity_name: "sensor.sensor_name4"
            friendly_name: "UV High Start"
          - entity_name: "sensor.sensor_name5"
            friendly_name: "Currently Temp Feels Like"

      # Example todo_list component (commented out):
      # - friendly_name: "Shopping List"
      #   type: "todo_list"
      #   entity_name: "todo.shopping_list"

  - name: daytime
    title: "Daytime"
    components:
      - friendly_name: "Shared Calendar"
        type: "calendar"
        # If true, the first component marked large_display will take the top half
        # of the screen, and the remaining components will be tiled along the bottom.
        large_display: true
        arguments:
          calendar_id: "calendar.shared"
          days: 2

      - entity_name: "sensor.asdf"
        friendly_name: "friend name"
        type: history_graph

      - entity_name: "sensor.sensor_name"
        friendly_name: "friendly name"
        type: entity

      - entity_name: "sensor.sensor_name10"
        friendly_name: "friendly name"
        type: history_graph

  - name: night
    title: "Night"
    components:
      - entity_name: "sensor.sensor_name"
        friendly_name: "friendly sensor name"
        type: history_graph

      - entity_name: "sensor.sensor_name2"
        friendly_name: "friendly sensor name"
        type: history_graph

      - entity_name: "sensor.sensor_name3"
        friendly_name: "temp"
        type: entity
